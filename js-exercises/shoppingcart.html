    <!DOCTYPE html>
    <html>
    <head>
    <title>Simple Object Project</title>

    <style>
    body{
    font-family: Arial;
    background: linear-gradient(to left,rgb(107,172,178),rgb(122,118,180));
    text-align:center;
    }

    #mainContainer{
    display:flex;
    justify-content:space-around;
    }

    .product{
    border:3px solid black;
    padding:10px;
    margin:10px;
    width:150px;
    background-color:rgb(10,168,168);
    border-radius:10px;
    }

    #productContainer{
    display:flex;
    flex-wrap:wrap;
    }

    #cart{
    border:3px solid black;
    padding:10px;
    width:250px;
    border-radius:20px;
    background-color:rgb(205,68,123);
    }

    #cart h3{
    margin-top:0;
    }
    </style>
    </head>

    <body>

    <h2>Fruits Section</h2>

    <div id="mainContainer">

    <div id="productContainer"></div>

    <div id="cart">
    <h3>Cart</h3>
    <div id="cartItems"></div>
    <h4>Total: ₹ <span id="total">0</span></h4>
    </div>

    </div>

    <script>

    // array of objects
    let product=[
    {name:"apple",price:40},
    {name:"orange",price:90},
    {name:"grapes",price:70},
    ];

    let container=document.getElementById("productContainer");
    let cartItemsDiv=document.getElementById("cartItems");
    let totalSpan=document.getElementById("total");

    let total=0;

    // loop products
    product.forEach(function(item){

    let div=document.createElement("div");
    div.classList.add("product");

    let title=document.createElement("h3");
    title.textContent=item.name;

    let price=document.createElement("p");
    price.textContent="Price: ₹"+item.price;

    let button=document.createElement("button");
    button.textContent="Buy";

    // click event
    button.onclick=function(){

    let cartItem=document.createElement("p");
    cartItem.textContent=item.name+" - ₹"+item.price;
    cartItemsDiv.appendChild(cartItem);

    total+=item.price;
    totalSpan.textContent=total;
    };

    // append elements
    div.appendChild(title);
    div.appendChild(price);
    div.appendChild(button);

    container.appendChild(div);

    });

    </script>

    </body>
    </html>
