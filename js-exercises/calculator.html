<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        body{
            text-align: center;
            margin-top: 100px;
            font-family: Arial;
            background: linear-gradient(to right, rgb(99, 203, 162), rgb(86, 229, 229),rgb(61, 134, 177));
        }
        input{
            padding: 8px;
            margin: 5px;
            width: 150px;
        }
        button{
            padding: 8px 15px;
            margin: 5px;
        }
        h2{
            color: white;
        }
    </style>
</head>
<body>

    <h1>Arithmetic Calculator</h1>

    <input type="number" id="num1" placeholder="Enter First Number"><br>
    <input type="number" id="num2" placeholder="Enter Second Number"><br>

    <button onclick="add()">+</button>
    <button onclick="subtract()">-</button>
    <button onclick="multiply()">*</button>
    <button onclick="divide()">/</button>

    <h2 id="result"></h2>

<script>
    const input1=document.getElementById("num1");
    const input2=document.getElementById("num2");
    function add(){
        let result=parseInt(input1.value)+parseInt(input2.value);
        document.getElementById("result").textContent="Result: " + result;
    }
    function subtract(){
        let result=parseInt(input1.value)-parseInt(input2.value);
        document.getElementById("result").textContent="Result: " + result;
    }

    function multiply(){
        let result=parseInt(input1.value)*parseInt(input2.value);
        document.getElementById("result").textContent="Result: " + result;
    }

    function divide(){
        let result=parseInt(input1.value)/parseInt(input2.value);
        document.getElementById("result").textContent="Result: " + result;
    }
</script>
</body>
</html>
